name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt -e .
      - run: ruff check src tests
      - run: ruff format --check src tests
      - run: mypy src

  unit:
    name: Unit + e2e tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt -e .
      - run: pytest tests/unit tests/e2e

  integration:
    name: Integration (Postgres ${{ matrix.pg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: ["15", "16"]
    services:
      postgres:
        image: postgres:${{ matrix.pg }}-alpine
        env:
          POSTGRES_USER: announcements
          POSTGRES_PASSWORD: announcements
          POSTGRES_DB: announcements
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U announcements -d announcements"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      ANNOUNCEMENTS_DATABASE_URL: postgresql+psycopg://announcements:announcements@localhost:5432/announcements
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt -e .
      - run: alembic upgrade head
      - run: pytest tests/integration -m integration

  coverage-gate:
    name: Combined coverage (>=85%)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: announcements
          POSTGRES_PASSWORD: announcements
          POSTGRES_DB: announcements
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U announcements -d announcements"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      ANNOUNCEMENTS_DATABASE_URL: postgresql+psycopg://announcements:announcements@localhost:5432/announcements
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt -e .
      - run: alembic upgrade head
      - run: pytest --cov-fail-under=85

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: announcements-api:ci
      - name: Build nginx image
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          load: true
          tags: announcements-nginx:ci
