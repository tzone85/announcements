services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: announcements
      POSTGRES_PASSWORD: announcements
      POSTGRES_DB: announcements
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U announcements -d announcements"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      ANNOUNCEMENTS_DATABASE_URL: postgresql+psycopg://announcements:announcements@postgres:5432/announcements
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    environment:
      ANNOUNCEMENTS_API_KEY: ${ANNOUNCEMENTS_API_KEY:-dev-key-change-me}
      ANNOUNCEMENTS_DATABASE_URL: postgresql+psycopg://announcements:announcements@postgres:5432/announcements
      ANNOUNCEMENTS_WEBHOOK_SUBSCRIBERS: ${ANNOUNCEMENTS_WEBHOOK_SUBSCRIBERS:-[]}
      ANNOUNCEMENTS_LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=2).status==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 5

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
